name: Run IgA Pipeline

on:
  workflow_dispatch:
  push:
    branches: [ main ]

permissions:
  contents: read
  actions: read

jobs:
  run-iga-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: 'release'
          use-public-rspm: true

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libcurl4-openssl-dev libssl-dev libxml2-dev libharfbuzz-dev libfribidi-dev libfreetype6-dev libpng-dev libtiff5-dev libjpeg-dev libfontconfig1-dev libgit2-dev pandoc

      - name: Install R dependencies
        run: |
          Rscript scripts/install_packages.R

      - name: Run IgA nephropathy pipeline
        run: |
          Rscript run_pipeline.R

      - name: Compress output
        if: always()
        run: |
          zip -r output.zip output || true

      - name: Upload results artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: iga_pipeline_output
          path: |
            output
            output.zip
          retention-days: 14
