name: Run IgA nephropathy pipeline

on:
  workflow_dispatch:
  push:
    branches: [ main ]

permissions:
  contents: read

jobs:
  run-iga-pipeline:
    name: Run bulk and single-cell IgA pipeline
    runs-on: ubuntu-latest
    timeout-minutes: 720

    env:
      R_KEEP_PKG_SOURCE: no
      R_REMOTES_NO_ERRORS_FROM_WARNINGS: true
      BIOCONDUCTOR_ONLINE_VERSION_DIAGNOSIS: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up R
        id: setup-r
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: release
          use-public-rspm: true

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            gfortran \
            libcurl4-openssl-dev \
            libssl-dev \
            libxml2-dev \
            libhdf5-dev \
            libgit2-dev \
            libfontconfig1-dev \
            libfreetype6-dev \
            libpng-dev \
            libtiff5-dev \
            libjpeg-dev \
            libharfbuzz-dev \
            libfribidi-dev \
            libfftw3-dev \
            libgsl-dev \
            libglpk-dev \
            libudunits2-dev \
            libgdal-dev \
            libgeos-dev \
            libproj-dev \
            zlib1g-dev \
            zip

      - name: Restore R package cache
        uses: actions/cache@v4
        with:
          path: ${{ env.R_LIBS_USER }}
          key: ${{ runner.os }}-r-${{ steps.setup-r.outputs.installed-r-version }}-${{ hashFiles('scripts/install_r_packages.R') }}
          restore-keys: |
            ${{ runner.os }}-r-${{ steps.setup-r.outputs.installed-r-version }}-

      - name: Install R package dependencies
        run: Rscript scripts/install_r_packages.R

      - name: Run IgA pipeline
        run: Rscript run_pipeline.R

      - name: Compress output directory
        if: always()
        run: zip -r output.zip output

      - name: Upload pipeline output artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: iga_pipeline_output
          path: |
            output/
            output.zip
          if-no-files-found: error
          retention-days: 30
