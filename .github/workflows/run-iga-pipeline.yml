name: Run IgA Pipeline

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  run-iga-pipeline:
    runs-on: ubuntu-latest

    env:
      BIOCONDUCTOR_CONFIG_FILE: ""
      BIOCONDUCTOR_ONLINE_VERSION_DIAGNOSIS: "FALSE"
      R_REMOTES_NO_ERRORS_FROM_WARNINGS: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install R and dependencies from Ubuntu apt
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            r-base \
            r-base-dev \
            build-essential \
            gfortran \
            pkg-config \
            libcurl4-openssl-dev \
            libssl-dev \
            libxml2-dev \
            libfontconfig1-dev \
            libfreetype6-dev \
            libpng-dev \
            libtiff5-dev \
            libjpeg-dev \
            libharfbuzz-dev \
            libfribidi-dev \
            zlib1g-dev \
            zip \
            r-cran-yaml \
            r-cran-ggplot2 \
            r-cran-pheatmap \
            r-cran-matrixstats \
            r-cran-reshape2 \
            r-cran-glmnet \
            r-cran-data.table \
            r-bioc-geoquery \
            r-bioc-biobase \
            r-bioc-limma \
            r-bioc-consensusclusterplus \
            r-bioc-annotationdbi \
            r-bioc-org.hs.eg.db

      - name: Install optional enrichment R packages from apt when available
        run: |
          set -u
          OPTIONAL_APT_PACKAGES=(
            r-bioc-clusterprofiler
            r-bioc-reactomepa
            r-bioc-enrichplot
            r-bioc-dose
            r-bioc-annotationdbi
            r-bioc-org.hs.eg.db
            r-cran-msigdbr
          )
          AVAILABLE_PACKAGES=()
          UNAVAILABLE_PACKAGES=()
          for pkg in "${OPTIONAL_APT_PACKAGES[@]}"; do
            if apt-cache show "$pkg" >/dev/null 2>&1; then
              AVAILABLE_PACKAGES+=("$pkg")
            else
              UNAVAILABLE_PACKAGES+=("$pkg")
            fi
          done
          if [ "${#AVAILABLE_PACKAGES[@]}" -gt 0 ]; then
            echo "Installing optional apt packages: ${AVAILABLE_PACKAGES[*]}"
            if ! sudo apt-get install -y --no-install-recommends "${AVAILABLE_PACKAGES[@]}"; then
              echo "::warning::Optional apt enrichment package installation failed; scripts/install_r_packages.R will retry from CRAN/Bioconductor."
            fi
          else
            echo "No optional enrichment apt packages are available on this runner."
          fi
          if [ "${#UNAVAILABLE_PACKAGES[@]}" -gt 0 ]; then
            echo "Optional apt packages unavailable: ${UNAVAILABLE_PACKAGES[*]}"
          fi
          echo "Optional apt package availability check complete."

      - name: Verify R package dependencies
        run: |
          Rscript ./scripts/install_r_packages.R

      - name: Run IgA pipeline
        run: |
          mkdir -p output/logs output/figures output/tables output/models
          Rscript run_pipeline.R

      - name: Compress output directory
        if: always()
        run: |
          mkdir -p output/logs output/figures output/tables output/models
          zip -r output.zip output || true

      - name: Upload pipeline output artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: iga_pipeline_output
          path: output.zip
          if-no-files-found: warn
