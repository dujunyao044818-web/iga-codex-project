name: Run IgA Pipeline

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  run-iga-pipeline:
    runs-on: ubuntu-latest

    env:
      BIOCONDUCTOR_CONFIG_FILE: ""
      R_REMOTES_NO_ERRORS_FROM_WARNINGS: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ✅ 关键修复1：稳定R环境（解决Bioconductor/CRAN问题）
      - name: Setup R (stable + RSPM)
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      # system dependencies
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libcurl4-openssl-dev libssl-dev libxml2-dev

      # ✅ 关键修复2：确保路径正确
      - name: Install R package dependencies
        run: |
          Rscript ./scripts/install_r_packages.R

      # Run pipeline
      - name: Run IgA pipeline
        run: |
          mkdir -p output/logs output/figures output/tables
          Rscript run_pipeline.R

      # Compress output
      - name: Compress output directory
        run: |
          zip -r output.zip output

      # Upload artifacts
      - name: Upload pipeline output artifact
        uses: actions/upload-artifact@v4
        with:
          name: iga_pipeline_output
          path: output.zip
